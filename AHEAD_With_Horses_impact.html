<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AHEAD With Horses — Impact Report</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #111827;
      --muted: #4b5563;
      --card: #f9fafb;
      --border: #e5e7eb;
      --max: 860px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, "Noto Sans", "Liberation Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }
    header {
      padding: 32px 18px 10px;
      border-bottom: 1px solid var(--border);
    }
    .wrap {
      max-width: var(--max);
      margin: 0 auto;
    }
    h1 {
      font-size: 28px;
      margin: 0 0 6px;
      letter-spacing: -0.02em;
    }
    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }
    main {
      padding: 22px 18px 44px;
    }
    .note {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      margin: 18px 0 26px;
      color: var(--muted);
      font-size: 14px;
    }
    .page {
      margin: 22px 0;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .page img {
      width: 100%;
      height: auto;
      display: block;
    }
    footer {
      border-top: 1px solid var(--border);
      padding: 18px;
      color: var(--muted);
      font-size: 12px;
    }
    .small {
      color: var(--muted);
      font-size: 12px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
    </div>
  </header>

  <main>
    <div class="wrap">

      <section class="page"><img src="AWH_html_assets/page_01.png" alt="Page 1"></section><section class="page"><img src="AWH_html_assets/page_02.png" alt="Page 2"></section><section class="page"><img src="AWH_html_assets/page_03.png" alt="Page 3"></section><section class="page"><img src="AWH_html_assets/page_04.png" alt="Page 4"></section><section class="page"><img src="AWH_html_assets/page_05.png" alt="Page 5"></section><section class="page"><img src="AWH_html_assets/page_06.png" alt="Page 6"></section><section class="page"><img src="AWH_html_assets/page_07.png" alt="Page 7"></section><section class="page"><img src="AWH_html_assets/page_08.png" alt="Page 8"></section><section class="page"><img src="AWH_html_assets/page_09.png" alt="Page 9"></section><section class="page"><img src="AWH_html_assets/page_10.png" alt="Page 10"></section>

      <p class="small">Tip: If you need this for email/newsletters, most email clients do not allow local image paths.
      You’d upload the images to a web host (or your email platform’s image library) and update the <code>src</code> URLs.</p>
    </div>
  </main>

  <footer>
    <div class="wrap">
      Generated for printing/sharing as a standalone HTML package.
    </div>
  </footer>
</body>
</html>
